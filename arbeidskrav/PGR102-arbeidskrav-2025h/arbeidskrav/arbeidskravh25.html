<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arbeidskrav PGR102</title>
    <link rel="stylesheet" href="arbeidskrav.css" />
</head>
<!-- HTML KODEN TRENGER DU IKKE RØRE FOR Å LØSE OPPGAVENE. DU SKAL KUN KODE I SCRIPT -->

<body>
    <div class="main-container">
        <div class="hero-health-containers">
            <div class="healthbar-container">
                <!-- healer-health sin vidde må forandres for å endre lifebar -->
                <div id="healer-health" class="healthbar"></div>
                <div class="text-container">
                    <!-- Disse må forandres på for å endre på navn og HP -->
                    <p id="healer-name-txt">Healerens navn</p>
                    <p id="healer-health-txt">400 / 400 HP</p>
                </div>
            </div>
            <div class="healthbar-container">
                <!-- archer-health sin vidde må forandres for å endre lifebar -->
                <div id="archer-health" class="healthbar"></div>
                <div class="text-container">
                    <!-- Disse må forandres på for å endre på navn og HP -->
                    <p id="archer-name-txt">Archerens navn</p>
                    <p id="archer-health-txt">600 / 600 HP</p>
                </div>
            </div>
            <div class="healthbar-container">
                <!-- warrior-health sin vidde må forandres for å endre lifebar -->
                <div id="warrior-health" class="healthbar"></div>
                <div class="text-container">
                    <!-- Disse må forandres på for å endre på navn og HP -->
                    <p id="warrior-name-txt">Warriorens navn</p>
                    <p id="warrior-health-txt">800 / 800 HP</p>
                </div>
            </div>
        </div>

        <!-- Healthbar til fienden -->
        <div class="dragon-health-container">
            <div class="healthbar-container">
                <!-- dragon-health sin vidde må forandres for å endre lifebar -->
                <div id="dragon-health" class="healthbar"></div>
                <div class="text-container">
                    <!-- Disse må forandres på for å endre på navn og HP -->
                    <p id="dragon-name-txt">Dragens navn</p>
                    <div id="dragon-health-txt" class="text-container">
                        2000 / 2000 HP
                    </div>
                </div>
            </div>
        </div>

        <!-- Bildecontainere for heroene. Disse bilde-containerne skal kunne trykkes på  -->
        <div id="healer" class="img-container">
            <img class="hero" src="assets/healer.png" />
        </div>
        <div id="archer" class="img-container">
            <img class="hero" src="assets/archer.png" />
        </div>
        <div id="warrior" class="img-container">
            <img class="hero" src="assets\warrior.png" />
        </div>

        <!-- Bildecontainer for fienden -->
        <div id="dragon" class="img-container">
            <img id="dragon-img" src="assets\dragon.png" />
        </div>
    </div>
    <script>
        //Denne JS-koden er laget klar for deg. Den trenger du ikke endre på. :-)
        //Stats for heroes: Du må ikke bruke alle stats videre i programmet ditt hvis du ikke ser det nødvendig.
        //Husk at for å hente ut noe fra et objekt som er i et array kan vi skrive for eksempel slik: heroesArray[1].name (Ariana Archer)

        let heroesArray = [
            {
                id: 0,
                name: "Henriette Healer",
                maxHP: 400,
                currentHP: 400,
                damage: 100,
                alive: true,
            },
            {
                id: 1,
                name: "Ariana archer",
                maxHP: 600,
                currentHP: 600,
                damage: 400,
                alive: true,
            },
            {
                id: 2,
                name: "Wyona Warrior",
                maxHP: 800,
                currentHP: 800,
                damage: 400,
                alive: true,
            },
        ];

        let dragonStats = {
            name: "Daar Dragon",
            maxHP: 2000,
            currentHP: 2000,
            damage: 200,
            alive: true,
        };

        //Bildene som skal kunne trykkes på
        const healer = document.getElementById("healer");
        const archer = document.getElementById("archer");
        const warrior = document.getElementById("warrior");

        const dragon = document.getElementById("dragon");

        //Navnene til heltene og dragen som kan oppdateres med riktig navn (tilleggsfunksjonalitet)
        const healerName = document.getElementById("healer-name-txt");
        const archerName = document.getElementById("archer-name-txt");
        const warriorName = document.getElementById("warrior-name-txt");

        const dragonName = document.getElementById("dragon-name-txt");

        //HP-tekstene til heltene som skal kunne oppdatere seg (tilleggsfunksjonalitet)
        const healerHealthTxt = document.getElementById("healer-health-txt");
        const archerHealthTxt = document.getElementById("archer-health-txt");
        const warriorHealthTxt = document.getElementById("warrior-health-txt");

        //HP-teksten til dragen som kan oppdatere seg (tilleggsfunksjonalitet)
        const dragonHealthTxt = document.getElementById("dragon-health-txt");

        //Healthbars som må oppdateres for at grønnfargen skal bli mindre når HP blir mindre (tilleggsfunksjonalitet)
        const healerHealthBar = document.getElementById("healer-health");
        const archerHealthBar = document.getElementById("archer-health");
        const warriorHealthBar = document.getElementById("warrior-health");

        const dragonHealthBar = document.getElementById("dragon-health");

        //Her kommer din kode! :o
    </script>

    <script>
        healer.onclick = function () { //Legger inn en onlick funksjon for hver av heltene
            heroesAttack=(heroesArray[0]);
            dragonHealth(heroesArray[0].damage); //trekker damage fra hp-en til dragen
            //alert som henter inn elementer fra array, og forteller hva damage hvilken helt gjør.
            alert(`${heroesArray[0].name} har gjort ${heroesArray[0].damage} skade på ${dragonStats.name}!`);
            //kaller så inn funksjonene jeg legger inn senere
            dragonCounterAttack();
            gameStatus();
            gameWinStatus();
        }
 
        archer.onclick = function () {
            heroesAttack=(heroesArray[1]);
            dragonHealth(heroesArray[1].damage);
            alert(`${heroesArray[1].name} har gjort: ${heroesArray[1].damage} skade på ${dragonStats.name}!`);
            dragonCounterAttack();
            gameStatus();
            gameWinStatus();
        }

        warrior.onclick = function () {
            heroesAttack=(heroesArray[2]);
            dragonHealth(heroesArray[2].damage);
            alert(`${heroesArray[2].name} har gjort: ${heroesArray[2].damage} skade på ${dragonStats.name}!`);
            dragonCounterAttack();
            gameStatus();
            gameWinStatus();
        }

        function dragonHealth(heroDamge) {
            //trekker damage fra currentHP til dragen, ut i fra heltens damge.
            dragonStats.currentHP -= heroDamge; 
            //Oppdaterer dragens nåværende liv i html og baren med style.width.
            dragonHealthTxt.innerHTML = (`${dragonStats.currentHP} / ${dragonStats.maxHP} HP`);
            dragonHealthBar.style.width = `${(dragonStats.currentHP / dragonStats.maxHP) * 300}px`;
        }

        function dragonCounterAttack () {
            //Velger en tilfeldig helt fra heroesArray, som dragen vil angripe.
            //Ved bruk av "Math.random" og Math.floor gjør jeg valget tilfeldig ut i fra "heroesArray.length". Altså lengden på heroesArrayet
            let randomIndex = Math.floor(Math.random() * heroesArray.length);
            let randomHero = heroesArray [randomIndex];
            
            //trekker fra HP-en til helten ut i fra hva damage dragen gjør.
            randomHero.currentHP -= dragonStats.damage;
            
            alert(`${dragonStats.name} har angrepet ${randomHero.name}!`);
            alert (`${dragonStats.name} har gjort ${dragonStats.damage} skade på ${randomHero.name}! HP er nå ${randomHero.currentHP}!`);

            //Oppdaterer health teksten i healthbaren til heltene, til nåværende hp
            healerHealthTxt.innerHTML = (`${heroesArray[0].currentHP} / ${heroesArray[0].maxHP} HP`);
            //tileggs funksjonalitet, gjør den grønne healthbaren til heltene mindre ettersom hva damage dem har tatt fra dragen.
            healerHealthBar.style.width = `${(heroesArray[0].currentHP / heroesArray[0].maxHP) * 300}px`;

            archerHealthTxt.innerHTML = (`${heroesArray[1].currentHP} / ${heroesArray[1].maxHP} HP`);
            archerHealthBar.style.width = `${(heroesArray[1].currentHP / heroesArray[1].maxHP) * 300}px`;

            warriorHealthTxt.innerHTML = (`${heroesArray[2].currentHP} / ${heroesArray[2].maxHP} HP`);
            warriorHealthBar.style.width = `${(heroesArray[2].currentHP / heroesArray[2].maxHP) * 300}px`;
        }
            

        function gameStatus (){
                //starter en teller for antall døde helter
               let deadHeroesCount = 0;

               //en løkke som sjekker om heltene er døde. Om det er døde øker deadHeroesCount med 1
               for (let i = 0; i < heroesArray.length; i ++) {
                if (heroesArray[i].currentHP <= 0) {
                    deadHeroesCount++;
                    }
               }
            
            //Sjekker om heltene er døde ved å sammenligne deadHeroesCount til lengden av heroesArray
            //deadHeroesCount === heroesArray.length trippel = for å passe på at allHeroesDead bare aktiveres om alle faktisk er døde.
            let allHeroesDead = (deadHeroesCount === heroesArray.length)
            //Setter at så lenge HP-en til dragen er over 0, så er den i live.
            let dragonAlive = dragonStats.currentHP > 0;
            
            //en løkke som aktiveres visst alle helter er døde og dragen er i live.
            if (allHeroesDead && dragonAlive) {
                alert(`Spillet er tapt! ${dragonStats.name} har vunnet!`);
                //fjerner heltene når spillet er tapt.
                document.getElementById("healer").remove();
                document.getElementById("archer").remove();
                document.getElementById("warrior").remove();
            } 
            else {
                console.log("spillet pågår fortsatt!");
            }
        }

        function gameWinStatus (){
            //Setter at dragen er dø ved at HP-en er mindre enn eller lik 0
            let dragonDefeated = dragonStats.currentHP <= 0;

            //lager en variabel som sjekker om minst en helt er i live. 
            let anyHeroAlive = false;

            //Ser igjennom heroesArrayet, aktiverest visst minst en helt har mer enn 0 HP og dragen har 0 eller mindre.
            for (let i= 0; i < heroesArray.length; i++) {
                if (heroesArray[i].currentHP > 0) {
                    //visst vi finner en helt settes anyHeroAlive til true.
                    anyHeroAlive = true;
                    break; //break fordi jeg avslutter løkken, når en helt med mer enn 0 HP er funnet.
                }
            }
            
            //Hvis dragen er dø og minst en helt er i livet.
            if (dragonDefeated && anyHeroAlive) {
                alert(`Gratulerer! ${dragonStats.name} er dø! du har vunnet spillet!`);
                document.getElementById("dragon").remove();
            }
            else {
                console.log ("spillet pågår fortsatt");
            }
        }



    </script>
</body>

</html>
