<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investeringer</title>

    <style> /* IKKE LOV Å ENDRE PÅ CSS */
        body{
            margin: 0;
        }
        #div-1, #div-2, #div-3, #div-4{
            border: 1px solid rgb(200, 200, 200);
            width: 400px;
            margin: 1rem;
            padding: 1rem;
        }
        #div-4{
            position: absolute;
            top: 0rem;
            left: 450px;
        }
        /* IKKE LOV Å ENDRE PÅ CSS */
    </style>
</head>
<body>


    <!-- IKKE LOV Å ENDRE PÅ NOE AV HTML'EN! -->
    <div id="div-1">        
        <h2>Din kapital</h2>        
        <p>Dine penger: <span id="your-money-span"></span>,- NOK</p>
    </div>

    <div id="div-2">

        <h2>Investér</h2>
        
        <div>
            <label>
                Id
                <input id="id-txt" type="number">
            </label>  
        </div>
       
        <input id="buy-company-btn" type="button" value="Kjøp bedrift">
        <input id="sell-company-btn" type="button" value="Selg bedrift">

        <p>Status: <span id="status-span">...</span></p>

    </div>


    <div id="div-2">

        <h2>Dine investeringer (antall: <span id="number-of-shops-bought-span"></span>)</h2>

        <div id="investments-div">
            <p>Ingen investeringer så langt.</p>
        </div>

    </div>
    

    <div id="div-4">

        <h2>Butikker</h2>      

        <div>
            <h3><span id="name1-span"></span> (id: 1)</h3>
            <p>Pris: <span id="price1-span"></span>,- NOK</p>
            <p>Kjøpt: <span id="bought1-span"></span></p>
        </div>

        <div>
            <h3><span id="name2-span"></span> (id: 2)</h3>
            <p>Pris: <span id="price2-span"></span>,- NOK</p>
            <p>Kjøpt: <span id="bought2-span"></span></p>
        </div>

        <div>
            <h3><span id="name3-span"></span> (id: 3)</h3>
            <p>Pris: <span id="price3-span"></span>,- NOK</p>
            <p>Kjøpt: <span id="bought3-span"></span></p>
        </div>

    </div>
    <!-- IKKE LOV Å ENDRE PÅ NOE AV HTML'EN! -->


    <script> // I DENNE SCRIPT-TAGEN SKAL DU/DERE KODE ALL JS FOR DENNE OPPGAVEN
        
        //Henter inn elementene jeg skal bruke
        const moneySpan = document.getElementById ("your-money-span");
        const statusSpan = document.getElementById ("status-span");
        const shopsBoughtSpan = document.getElementById ("number-of-shops-bought-span");
        const buyButton = document.getElementById ("buy-company-btn");
        const sellButton = document.getElementById ("sell-company-btn");
        const idTxt = document.getElementById ("id-txt");

        const name1Span = document.getElementById ("name1-span");
        const name2Span = document.getElementById ("name2-span");
        const name3Span = document.getElementById ("name3-span");
        const bought1Span = document.getElementById ("bought1-span");
        const bought2Span = document.getElementById ("bought2-span");
        const bought3Span = document.getElementById ("bought3-span");

        const investmentsDiv = document.getElementById("investments-div");

        //Setter start verdier.
        let capital = 500000;
        let investsments = 0;
        let ownedCompanies = [];

        //Gir verdier til bedriftene.
        const companyPrices = {
            1: 100000,
            2: 200000,
            3: 150000,
        };
        
        //Gir navn til bedriftene.
        const companyNames = {
            1: "Burger Champ",
            2: "ITConsult",
            3: "LakseFiske"
        };

        //Setter status for kjøpt til "nei".
        const boughtStatus = {
            1: "Nei",
            2: "Nei",
            3: "Nei"
        };

        //Endrer grensesnittet med initialverdier.
        moneySpan.innerHTML = capital;
        statusSpan.innerHTML = "Klar for kjøp og salg!";
        shopsBoughtSpan.innerHTML = investsments;

        //Oppdaterer status for kjøpt
        function updateCompanyInfo() {
            name1Span.innerHTML = companyNames[1];
            name2Span.innerHTML = companyNames[2];
            name3Span.innerHTML = companyNames[3];
            bought1Span.innerHTML = boughtStatus[1];
            bought2Span.innerHTML = boughtStatus[2];
            bought3Span.innerHTML = boughtStatus[3];
        }

        //Oppdaterer liste av eide bedrifter.
        function updateInvestments() {
            shopsBoughtSpan.innerHTML = investsments;
            investmentsDiv.innerHTML = "";
            if (ownedCompanies.length > 0) {
                for (let i = 0; i < ownedCompanies.length; i++) {
                    const companyID = ownedCompanies[i];
                    const companyName = companyNames[companyID];
                    const companyElement = document.createElement("p");
                    companyElement.textContent = companyName;
                    investmentsDiv.appendChild(companyElement);
                }
            }
            else {
                investmentsDiv.innerHTML ="<p>Ingen investeringer så langt.</p>"
            }
        }

        //Kaller på funksjonen for å oppdatere grensesnittet.
        updateCompanyInfo();
        updateInvestments();

        //Onclick til funksjonene jeg lager.
        buyButton.onclick = buyCompany;
        sellButton.onclick = sellCompany;

        //Funksjon som lar deg kjøpe bedrifter og sjekker om du har nok penger.
        function buyCompany() {
            const companyID = parseInt(idTxt.value);
            const price = companyPrices[companyID];

            if (price && capital >= price) {
                capital -= price;
                investsments++;
                ownedCompanies.push(companyID);
                moneySpan.innerHTML = capital;
                shopsBoughtSpan.innerHTML = investsments;
                statusSpan.innerHTML = "Vellykket kjøp! :)";
                statusSpan.style.color = "green";
                boughtStatus[companyID] = "Ja"
                updateCompanyInfo();
                updateInvestments();
            }
            else {
                statusSpan.innerHTML = "Ikke nok penger eller ugyldig ID.";
                statusSpan.style.color = "red";
            }
        }

        //Funksjon som lar deg selge bedrifter, visst du eier den.
        function sellCompany() {
            const companyID = parseInt(idTxt.value);
            const price = companyPrices[companyID];

            if (price && investsments > 0) {
                capital += price;
                investsments--;
                ownedCompanies = ownedCompanies.filter(id => id !== companyID);
                moneySpan.innerHTML = capital;
                shopsBoughtSpan.innerHTML = investsments;
                statusSpan.innerHTML = "Vellykket salg! :)";
                statusSpan.style.color = "green;";
                boughtStatus[companyID] = "Nei";
                updateCompanyInfo();
                updateInvestments();
            }
            else {
                statusSpan.innerHTML = "Ingen bedrifter å selge eller ugyldig ID.";
                statusSpan.style.color = "red";
            }
        }




    </script>
    
</body>
</html>
